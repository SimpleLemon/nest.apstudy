<!DOCTYPE html>
<html lang="en" data-apstudy-theme-preference="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Echo Show dashboard for Nest." />
    <title>Echo Show · Nest</title>
    <script>window.APSTUDY_THEME_PREFERENCE = "dark";</script>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    {% include "_diagnostics_assets.html" %}
    <link rel="icon" href="{{ url_for('static', filename='images/brand/nest-logo-v1-32.png') }}" />
    {% include "_font_assets.html" %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/derek-echo.css') }}" />
    <script type="module" src="{{ url_for('static', filename='js/derek/echo.js') }}"></script>
</head>
<body class="echo-body" data-analytics-mode="authenticated" data-analytics-measurement-id="G-0NT330ZX5L">
    <main class="echo-dash" data-echo-dash data-mode="home">
        <section class="echo-clock" data-echo-clock aria-label="Clock">
            <div class="echo-clock-face">
                <span class="echo-flip"><span class="echo-flip-glyph" data-echo-digit="h1">1</span></span>
                <span class="echo-flip"><span class="echo-flip-glyph" data-echo-digit="h2">0</span></span>
                <span class="echo-flip-colon" aria-hidden="true">:</span>
                <span class="echo-flip"><span class="echo-flip-glyph" data-echo-digit="m1">1</span></span>
                <span class="echo-flip"><span class="echo-flip-glyph" data-echo-digit="m2">6</span></span>
            </div>
            <p class="echo-date" data-echo-date>Thursday, July 23</p>
        </section>

        <button type="button" class="echo-playlist-btn" data-echo-playlist-open aria-label="Open playlist videos" hidden>
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>
        </button>

        <section class="echo-calendar" aria-label="Two day calendar">
            <div class="echo-week" data-echo-calendar>
                <p class="echo-empty">Loading calendar…</p>
            </div>
        </section>

        <section class="echo-secondary" data-echo-secondary>
            <div class="echo-next" data-echo-next-panel>
                <button type="button" class="echo-next-body" data-echo-next data-echo-agenda-open aria-label="Show upcoming events">
                    <p class="echo-empty">Loading next event…</p>
                </button>
                <button type="button" class="echo-music-btn" data-echo-music-open aria-label="Play YouTube playlist">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
                    </svg>
                </button>
            </div>
        </section>

        <section class="echo-music-player" data-echo-music-frame hidden aria-label="YouTube playlist player">
            <div id="echo-yt-player"></div>
        </section>
    </main>

    <div class="echo-modal" data-echo-agenda-modal hidden>
        <button type="button" class="echo-modal-backdrop" data-echo-agenda-close aria-label="Close upcoming events"></button>
        <div class="echo-modal-panel" role="dialog" aria-modal="true" aria-labelledby="echo-agenda-title">
            <header class="echo-modal-header">
                <h2 id="echo-agenda-title">Upcoming</h2>
                <button type="button" class="echo-modal-close" data-echo-agenda-close aria-label="Close">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7a1 1 0 0 0-1.4 1.4L10.6 12l-4.9 4.9a1 1 0 1 0 1.4 1.4L12 13.4l4.9 4.9a1 1 0 0 0 1.4-1.4L13.4 12l4.9-4.9a1 1 0 0 0 0-1.4z"/>
                    </svg>
                </button>
            </header>
            <div class="echo-modal-body" data-echo-agenda>
                <p class="echo-empty">Loading…</p>
            </div>
        </div>
    </div>

    <div class="echo-modal" data-echo-playlist-modal hidden>
        <button type="button" class="echo-modal-backdrop" data-echo-playlist-close aria-label="Close playlist"></button>
        <div class="echo-modal-panel echo-modal-panel--playlist" role="dialog" aria-modal="true" aria-labelledby="echo-playlist-title">
            <header class="echo-modal-header">
                <h2 id="echo-playlist-title">Playlist</h2>
                <button type="button" class="echo-modal-close" data-echo-playlist-close aria-label="Close">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7a1 1 0 0 0-1.4 1.4L10.6 12l-4.9 4.9a1 1 0 1 0 1.4 1.4L12 13.4l4.9 4.9a1 1 0 0 0 1.4-1.4L13.4 12l4.9-4.9a1 1 0 0 0 0-1.4z"/>
                    </svg>
                </button>
            </header>
            <div class="echo-modal-body echo-playlist-list" data-echo-playlist-list>
                <p class="echo-empty">Loading playlist…</p>
            </div>
        </div>
    </div>
</body>
</html>
