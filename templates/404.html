<!DOCTYPE html>
<html lang="en" data-apstudy-theme-preference="system-match" data-apstudy-theme-locked="true">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <title>404 - APStudy Nest</title>
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png" alt="APStudy Logo">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <meta name="description" content="Page not found."/>
</head>
<body class="error-page">
    <div class="error-shell">
        <main class="error-content" role="main">
            <section class="error-card" aria-labelledby="error-title">
                <p class="error-code">404</p>
                <h1 id="error-title" class="error-title">Page Not Found</h1>
                <p class="error-copy">The page you are looking for doesn't exist or has been moved.</p>
                <a class="error-action" href="{{ home_url }}">Go Home</a>
            </section>
        </main>
        <div class="error-tiles" aria-hidden="true">
            <span class="error-tile"></span>
            <span class="error-tile"></span>
            <span class="error-tile"></span>
            <span class="error-tile"></span>
            <span class="error-tile"></span>
            <span class="error-tile"></span>
        </div>
    </div>
</body>
</html>
