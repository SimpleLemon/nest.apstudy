<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script>
        window.APSTUDY_THEME_PREFERENCE = "system-match";
        window.APSTUDY_THEME_LOCKED = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@17/dist/iife/sdk.js"></script>
    <script src="{{ url_for('static', filename='js/appwrite.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme-init.js') }}"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <title>Login - Nest University | APStudy</title>
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png" alt="APStudy Logo">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <script src="{{ url_for('static', filename='js/global.js') }}" defer></script>
    <script src="https://kit.fontawesome.com/a7731f7ef8.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="description" content="Track and plan assignments and class schedules. Built for Nest University by a Nest Student."/>
    <meta property="og:url" content="https://nest.apstudy.org/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nest University | APStudy">
    <meta property="og:description" content="Track and plan assignments and class schedules. Built for Nest University by a Nest Student."/>
    <meta property="og:image" content="https://resources.apstudy.org/images/APResourcesBanner.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="nest.apstudy.org">
    <meta property="twitter:url" content="https://nest.apstudy.org/">
    <meta name="twitter:title" content="Nest University | APStudy">
    <meta name="twitter:description" content="Track and plan assignments and class schedules. Built for Nest University by a Nest Student."/>
    <meta name="twitter:image" content="https://resources.apstudy.org/images/APResourcesBanner.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0NT330ZX5L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-0NT330ZX5L');
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Ambient background glow -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-container-low/50 via-background to-background -z-10"></div>

    <div class="flex-1 w-full flex items-center justify-center p-4 pb-24">
    <!-- Main Card Container -->
    <div class="relative w-full max-w-[420px]">

        <!-- Ghost border glow -->
        <div class="absolute -inset-[1px] bg-gradient-to-br from-outline-variant/20 to-transparent rounded-[14px] blur-[2px] opacity-50 pointer-events-none"></div>

        <main class="bg-surface-container rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative z-10 flex flex-col pt-12 pb-10 px-8 sm:px-10">

            <!-- Branding Header -->
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                </div>
                <h1 class="font-headline font-semibold text-2xl tracking-tight text-on-surface mb-2">Welcome!</h1>
                <p class="font-body text-sm text-on-surface-variant font-medium tracking-tight">Nest.APStudy.org</p>
            </div>

            <!-- Error Message (shown via Jinja if present) -->
            {% if error %}
            <div class="mb-6 p-3 rounded bg-error-container/20 ring-1 ring-error-container border-l-4 border-error text-sm text-error font-body flex items-start gap-2">
                <span class="material-symbols-outlined text-lg shrink-0">error</span>
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <!-- Google Sign-In Section -->
            <div class="flex flex-col gap-4">
                     <a href="{{ url_for('auth.authorize') }}"
                   class="w-full bg-surface-container-lowest text-on-surface font-headline font-medium py-3.5 rounded-lg ring-1 ring-outline-variant/30 hover:ring-primary/50 hover:bg-surface-container-low transition-all duration-150 flex items-center justify-center gap-3 group no-underline">
                    <!-- Google "G" logo SVG -->
                    <svg width="20" height="20" viewBox="0 0 48 48" class="shrink-0">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span>Sign in with Google</span>
                    <span class="material-symbols-outlined text-lg opacity-50 group-hover:opacity-100 transition-opacity">arrow_forward</span>
                </a>

                <!-- Login note -->
                <p class="text-center text-xs text-on-surface-variant/70 font-body">
                    Sign in with your Google account to continue
                </p>
            </div>
            <!-- Footer -->
            <div class="mt-10 text-center">
                <p class="text-xs text-on-surface-variant font-body">
                    Did something go wrong? <a class="text-primary hover:underline underline-offset-2" href="mailto:derek.chen@emory.edu">Contact IT</a>
                </p>
            </div>
        </main>
    </div>
    </div>
    <global class="thefooter block w-full mt-auto"></global>
</body>
</html>
