    <style>
        html,
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
        }

        body.login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 48px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 32px 24px;
            box-shadow: 0 0 0 1px rgba(48, 54, 61, 0.35), 0 16px 32px rgba(1, 4, 9, 0.3);
        }

        @media (min-width: 640px) {
            .login-card {
                padding: 40px 32px;
            }
        }

        .login-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            margin-bottom: 24px;
        }

        .login-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #21262d;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #58a6ff;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: #f0f6fc;
        }

        .login-error {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #f85149;
            background: #2d1a1f;
            color: #f85149;
            font-size: 12px;
        }

        .oauth-button {
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            font-weight: 600;
            transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 150ms ease;
        }

        .oauth-button:hover {
            background: #30363d;
            border-color: #8b949e;
            transform: translateY(-1px);
        }

        .oauth-button:active {
            transform: translateY(0);
        }

        .oauth-button--github,
        .oauth-button--discord,
        .oauth-button--google {
            background: #21262d;
            color: #c9d1d9;
            border-color: #30363d;
        }

        .oauth-icon--discord { transform: translateX(1px); }

        .login-footer footer {
            background: transparent;
            border-top: 1px solid #30363d;
            color: #8b949e;
            padding: 20px 16px;
        }

        .login-footer footer > div {
            padding: 0;
        }

        .login-footer footer span,
        .login-footer footer a {
            color: #8b949e;
        }

        .login-footer footer a:hover {
            color: #58a6ff;
        }

        .login-footer footer div > div {
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 18px;
        }

        @media (max-width: 640px) {
            .login-footer footer div {
                text-align: center;
            }

            .login-footer footer div > div {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .login-footer footer a {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-shell">
        <div class="login-content">
            <main class="login-card">
                <!-- Branding Header -->
                <div class="login-brand">
                    <div class="login-logo">
                        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    </div>
                    <h1 class="login-title">Sign in to Nest</h1>
                </div>

            <!-- Error Message (shown via Jinja if present) -->
            {% if error %}
            <div class="login-error">
                <span class="material-symbols-outlined text-lg shrink-0">error</span>
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <!-- OAuth2 Sign-In Section -->
            <div class="flex flex-col gap-2">
                <button id="oauth-google" type="button" class="w-full font-headline py-3.5 rounded-lg transition-colors duration-150 flex items-center justify-center gap-3 oauth-button oauth-button--google">
                    <svg width="20" height="20" viewBox="0 0 48 48" class="shrink-0" aria-hidden="true">

                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>

                <button id="oauth-github" type="button" class="w-full font-headline py-3.5 rounded-lg transition-colors duration-150 flex items-center justify-center gap-3 oauth-button oauth-button--github">
                    <svg width="20" height="20" viewBox="0 0 24 24" class="shrink-0" aria-hidden="true">
                        <path fill="currentColor" d="M12 0.296c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.387 0.6 0.113 0.82-0.258 0.82-0.577 0-0.285-0.01-1.04-0.015-2.04-3.338 0.724-4.042-1.61-4.042-1.61-0.546-1.387-1.333-1.756-1.333-1.756-1.09-0.745 0.082-0.729 0.082-0.729 1.205 0.084 1.84 1.236 1.84 1.236 1.07 1.835 2.809 1.305 3.495 0.998 0.108-0.776 0.418-1.305 0.762-1.605-2.665-0.303-5.466-1.333-5.466-5.931 0-1.31 0.469-2.381 1.235-3.221-0.123-0.303-0.535-1.523 0.117-3.176 0 0 1.008-0.322 3.301 1.23a11.51 11.51 0 0 1 3.003-0.404c1.018 0.005 2.045 0.137 3.003 0.404 2.291-1.552 3.297-1.23 3.297-1.23 0.653 1.653 0.241 2.873 0.118 3.176 0.77 0.84 1.233 1.911 1.233 3.221 0 4.61-2.805 5.625-5.479 5.921 0.43 0.37 0.814 1.096 0.814 2.211 0 1.596-0.014 2.879-0.014 3.27 0 0.322 0.216 0.694 0.825 0.576C20.565 22.092 24 17.592 24 12.296c0-6.627-5.373-12-12-12z"/>

                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.006 14.006 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />

            </div>
            <!-- Footer -->
            <div class="mt-10 text-center">
                <p class="text-xs text-on-surface-variant font-body">
                    Did something go wrong? <a class="text-primary hover:underline underline-offset-2" href="mailto:derek.chen@emory.edu">Contact IT</a>
                </p>
            </div>
            </main>
        </div>
        <global class="thefooter login-footer"></global>
    </div>
    <script>
        const successRedirect = `${window.location.origin}/dashboard`;
        const failureRedirect = `${window.location.origin}/login`;
        const providerStorageKey = "apstudy-oauth-provider";

        function exchangeAppwriteSession(provider, accountData, providerAccessToken) {
            if (!accountData) {
                return Promise.reject(new Error("Missing Appwrite account data"));
            }
            const userId = accountData.$id || accountData.id;
            const email = accountData.email;
            if (!userId) {
                return Promise.reject(new Error("Missing Appwrite user id"));
            }
            const body = { user_id: userId, email: email };
            if (provider) body.provider = provider;
            if (providerAccessToken) body.provider_access_token = providerAccessToken;
            return fetch("/auth/session", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            }).then(function(response) {
                if (!response.ok) {
                    throw new Error("Failed to exchange session");
                }
                return response.json();
            });
        }

        function getCurrentSessionDetails() {
            if (!account || typeof account.getSession !== "function") {
                return Promise.resolve({});
            }
            return account.getSession("current")
                .then(function(sessionData) {
                    return {
                        provider: sessionData && sessionData.provider,
                        providerAccessToken: sessionData && sessionData.providerAccessToken,
                    };
                })
                .catch(function() {
                    return {};
                });
        }

        function shouldSkipAutoLogin() {
            const params = new URLSearchParams(window.location.search);
            if (params.get("logged_out") === "1") {
                return true;
            }
            try {
                return sessionStorage.getItem("apstudy-logged-out") === "true";
            } catch (error) {
                return false;
            }
        }

        if (account && typeof account.get === "function" && !shouldSkipAutoLogin()) {
            account.get()
                .then(function(acc) {
                    return getCurrentSessionDetails().then(function(sessionDetails) {
                        const provider = sessionStorage.getItem(providerStorageKey)
                            || sessionDetails.provider
                            || "appwrite";
                        return exchangeAppwriteSession(
                            provider,
                            acc,
                            sessionDetails.providerAccessToken
                        ).then(function(data) {
                            sessionStorage.removeItem(providerStorageKey);
                            const redirectTo = (data && data.redirect) ? data.redirect : successRedirect;
                            window.location.href = redirectTo;
                        });
                    });
                })
                .catch(function() {
                    // No active session, stay on login page
                });
        }

        if (shouldSkipAutoLogin()) {
            try {
                sessionStorage.removeItem("apstudy-logged-out");
            } catch (error) {
                // Ignore storage errors
            }
        }

        [
            { id: "oauth-github", provider: "github" },
            { id: "oauth-discord", provider: "discord" },
            { id: "oauth-google", provider: "google" }
        ].forEach(function(entry) {
            const button = document.getElementById(entry.id);
            if (!button) {
                return;
            }
            button.addEventListener("click", function() {
                sessionStorage.setItem(providerStorageKey, entry.provider);
                account.createOAuth2Session(entry.provider, successRedirect, failureRedirect);
            });
        });
    </script>
</body>
