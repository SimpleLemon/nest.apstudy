<aside class="admin-sidebar" aria-label="Admin navigation">
    <div class="admin-sidebar-brand">
        <a class="admin-sidebar-back" href="/dashboard" aria-label="Back to dashboard">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        </a>
        <span class="admin-sidebar-logo material-symbols-outlined" aria-hidden="true">admin_panel_settings</span>
        <span class="admin-sidebar-name">Admin</span>
    </div>
    <nav class="admin-sidebar-nav">
        <a class="admin-sidebar-item {% if active_admin_page == 'home' %}is-active{% endif %}" href="{{ url_for('admin.admin_index') }}">
            <span class="admin-sidebar-icon material-symbols-outlined" aria-hidden="true">home</span>
            <span>Home</span>
        </a>
        <a class="admin-sidebar-item {% if active_admin_page == 'users' %}is-active{% endif %}" href="{{ url_for('admin.admin_users') }}">
            <span class="admin-sidebar-icon material-symbols-outlined" aria-hidden="true">group</span>
            <span>User Directory</span>
        </a>
        <a class="admin-sidebar-item {% if active_admin_page == 'requests' %}is-active{% endif %}" href="{{ url_for('admin.admin_requests') }}">
            <span class="admin-sidebar-icon material-symbols-outlined" aria-hidden="true">inbox</span>
            <span>Requests</span>
            {% if pending_request_count %}
                <span class="admin-sidebar-count">{{ pending_request_count }}</span>
            {% endif %}
        </a>
    </nav>
</aside>
