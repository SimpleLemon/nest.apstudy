<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@25.0.0/dist/iife/sdk.js"></script>
    <script src="{{ url_for('static', filename='js/core/appwrite.js') }}"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan tasks, deadlines, and repeating work in APStudy Nest." />
    <title>Tasks - APStudy Nest</title>
    <script>
        window.APSTUDY_THEME_PREFERENCE = "{{ theme_preference or '' }}";
    </script>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/task.css') }}">
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1?dev",
            "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
            "react-dom": "https://esm.sh/react-dom@18.3.1?dev&deps=react@18.3.1",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev&deps=react@18.3.1",
            "use-sound": "https://esm.sh/use-sound@5.0.0?dev&deps=react@18.3.1&external=react"
        }
    }
    </script>
    <script src="{{ url_for('static', filename='js/core/global-chrome.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/navbar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/sidebar.js') }}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    <script type="module" src="{{ url_for('static', filename='js/tasks/task.js') }}"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<global class="thenav" data-profile-picture="{{ (user.picture or '')|avatar_url(32) }}" data-user-email="{{ user.email }}"></global>
<global class="thesidebar" data-user-emory-student="{{ user.emory_student }}" data-sidebar-default="{{ sidebar_default|default('expanded') }}"></global>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary-fixed">
    <main class="task-page-shell flex-1 w-full px-6 md:px-8 pt-6 pb-10 relative z-10">
        <div id="task-root" data-complete-sound="{{ url_for('static', filename='audio/task-pop.mp3') }}" data-uncomplete-sound="{{ url_for('static', filename='audio/task-pop-down.mp3') }}"></div>
        <global class="thefooter"></global>
    </main>
</body>
</html>
