<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan Emory courses and track seat openings." />
    <title>Courses - APStudy Nest</title>
    <script>
        window.APSTUDY_THEME_PREFERENCE = "{{ theme_preference or '' }}";
        window.APSTUDY_COURSES_DEFAULT_TERM = "{{ default_term or '' }}";
        window.APSTUDY_COURSES_DEFAULT_CAMPUS = "{{ default_campus or 'atlanta' }}";
        window.APSTUDY_ATLAS_SRCDB = {{ atlas_srcdb | tojson }};
        window.APSTUDY_ATLAS_BROWSER_DIRECT_ENABLED = false;
        window.APSTUDY_COURSES_GENERAL_ED_REQUIREMENTS = {{ (general_ed_requirements or []) | tojson }};
    </script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@25.0.0/dist/iife/sdk.js"></script>
    {% include '_appwrite_meta.html' %}
    <script src="{{ url_for('static', filename='js/core/appwrite.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/courses.css') }}">
    <script src="{{ url_for('static', filename='js/core/global-chrome.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/ui-primitives.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/navbar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/sidebar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/atlas-live.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/filters.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/panel.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/calendar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/controls.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/data.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/courses/index.js') }}" defer></script>
</head>
<body class="courses-body bg-surface text-on-surface font-body min-h-screen antialiased selection:bg-primary/30 selection:text-primary-fixed">
    <global class="thenav" data-profile-picture="{{ (user.picture or '')|avatar_url(32) }}" data-user-email="{{ user.email }}"></global>
    {% set sidebar_user_emory_student = user.emory_student %}
    {% include "_sidebar.html" %}
    <main class="courses-main" aria-label="Emory courses planner">
        <aside class="courses-panel" aria-label="Course search and details">
            <section class="courses-panel-header">
                <div>
                    <h1>Courses</h1>
                    <p id="courses-result-summary">Loading Emory Atlas...</p>
                </div>
            </section>
            <section class="courses-search-stack" id="courses-search-stack" aria-label="Course filters">
                <div class="courses-view-toggle" role="group" aria-label="Course list view">
                    <button type="button" data-course-view="search" aria-pressed="true">
                        <span class="material-symbols-outlined" aria-hidden="true">search</span>
                        <span>Search</span>
                    </button>
                    <button type="button" data-course-view="selected" aria-pressed="false">
                        <span class="material-symbols-outlined" aria-hidden="true">playlist_add_check</span>
                        <span>Selected</span>
                    </button>
                    <button type="button" data-course-view="tracked" aria-pressed="false">
                        <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
                        <span>Tracked</span>
                    </button>
                </div>
                <div class="courses-search-row">
                    <label class="courses-search-field">
                        <span class="material-symbols-outlined" aria-hidden="true">search</span>
                        <input id="courses-search-input" type="search" autocomplete="off" placeholder="Search classes" />
                    </label>
                    <button id="courses-filter-button" class="courses-filter-button" type="button" aria-label="Filter courses" aria-expanded="false" aria-controls="courses-filter-popover">
                        <span class="material-symbols-outlined" aria-hidden="true">tune</span>
                        <span id="courses-filter-count" class="courses-filter-count" hidden>0</span>
                    </button>
                </div>
                <div id="courses-filter-popover" class="courses-filter-popover" hidden>
                    <label class="courses-filter-popover-term">
                        <span>Term</span>
                        <select id="courses-term-select"></select>
                    </label>
                    <div class="courses-filter-grid">
                        <label>
                            <span>Campus</span>
                            <select id="courses-campus-filter">
                                <option value="all">All</option>
                                <option value="atlanta">Atlanta (Main)</option>
                                <option value="oxford">Oxford</option>
                            </select>
                        </label>
                        <label>
                            <span>General Ed</span>
                            <select id="courses-requirement-filter">
                                <option value="all">All</option>
                                {% for requirement in general_ed_requirements or [] %}
                                    <option value="{{ requirement }}">{{ requirement }}</option>
                                {% endfor %}
                            </select>
                        </label>
                    </div>
                    <div class="courses-filter-popover-section">
                        <span class="courses-filter-label">Days</span>
                        <div class="courses-day-toggle" id="courses-day-toggle" role="group" aria-label="Days of week">
                            <button type="button" data-day="Mon">Mon</button>
                            <button type="button" data-day="Tue">Tue</button>
                            <button type="button" data-day="Wed">Wed</button>
                            <button type="button" data-day="Thu">Thu</button>
                            <button type="button" data-day="Fri">Fri</button>
                        </div>
                    </div>
                    <div class="courses-time-filter">
                        <label class="courses-time-switch">
                            <input id="courses-time-enabled" type="checkbox" />
                            <span>Time</span>
                        </label>
                        <label>
                            <span>From</span>
                            <input id="courses-time-start" type="time" value="06:00" min="06:00" max="23:59" disabled />
                        </label>
                        <label>
                            <span>To</span>
                            <input id="courses-time-end" type="time" value="23:59" min="06:00" max="23:59" disabled />
                        </label>
                    </div>
                </div>
            </section>
            <section id="courses-panel-content" class="courses-panel-content" aria-live="polite"></section>
        </aside>
        <section class="courses-calendar-shell" aria-label="Simulated weekly course schedule">
            <header class="courses-calendar-header">
                <div>
                    <h2 id="courses-week-title">Week View</h2>
                    <p id="courses-term-dates">Monday-Friday, 6 AM-midnight</p>
                </div>
                <div class="courses-week-controls">
                    <button id="courses-prev-term" type="button" aria-label="Previous term">
                        <span class="material-symbols-outlined" aria-hidden="true">chevron_left</span>
                    </button>
                    <button id="courses-next-term" type="button" aria-label="Next term">
                        <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
                    </button>
                </div>
            </header>
            <div id="courses-calendar-root" class="courses-calendar-root"></div>
        </section>
    </main>
</body>
</html>
