<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Your APStudy Nest morning brief." />
    <title>Dashboard - APStudy Nest</title>
    <script>
        window.APSTUDY_THEME_PREFERENCE = "{{ theme_preference or '' }}";
    </script>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    {% include '_sidebar_init.html' %}
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    {% include "_font_assets.html" %}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <script src="{{ url_for('static', filename='js/core/global-chrome.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/navbar.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/core/sidebar.js') }}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard/utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard/renderers.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard/daily-quote/data.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard/daily-quote.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/dashboard/index.js') }}" defer></script>
</head>
<body class="dashboard-body bg-surface text-on-surface font-body min-h-screen antialiased" data-analytics-mode="authenticated" data-analytics-measurement-id="G-0NT330ZX5L">
    <global class="thenav" data-profile-picture="{{ (user.picture or '')|avatar_url(32) }}" data-user-email="{{ user.email }}" data-user-tier="{{ user_tier or '' }}"></global>
    {% set sidebar_user_emory_student = user.emory_student %}
    {% include "_sidebar.html" %}
    <main class="workspace-page-shell dashboard-main" aria-labelledby="dashboard-title">
        <header class="dashboard-header">
            <div>
                <h1 id="dashboard-title" class="workspace-page-title">Dashboard</h1>
            </div>
            <div class="dashboard-header-actions">
                <div class="dashboard-add-wrap">
                    <button id="dashboard-add-tile" class="dashboard-header-link dashboard-add-toggle" type="button" aria-label="Add dashboard tile" title="Add tile" aria-expanded="false" aria-haspopup="menu" hidden>
                        <span class="material-symbols-outlined" aria-hidden="true">add</span>
                        <span class="dashboard-action-label">Add tile</span>
                    </button>
                    <div id="dashboard-add-menu" class="dashboard-add-menu" role="menu" hidden></div>
                </div>
                <button id="dashboard-edit-layout" class="dashboard-header-link dashboard-edit-toggle" type="button" aria-label="Edit dashboard layout" title="Edit layout" aria-pressed="false">
                    <span class="material-symbols-outlined" aria-hidden="true">dashboard_customize</span>
                    <span class="dashboard-action-label">Edit layout</span>
                </button>
            </div>
        </header>

        <section id="dashboard-checklist" class="dashboard-checklist" aria-label="Academic setup checklist" hidden></section>

        <section id="dashboard-daily-quote" class="dashboard-daily-quote-slot" aria-live="polite"></section>

        <section class="dashboard-tiles-region" aria-label="Dashboard tiles">
            <div id="dashboard-tiles" class="dashboard-tiles" aria-live="polite">
                <div class="dashboard-loading apstudy-skeleton" role="status" aria-live="polite" aria-busy="true">
                    <span class="sr-only">Loading your dashboard...</span>
                    <div class="contents" aria-hidden="true">
                        {% for _ in range(4) %}
                            <article class="dashboard-skeleton-tile">
                                <div class="dashboard-skeleton-tile-inner">
                                    <div class="dashboard-tile-head">
                                        <div class="dashboard-tile-title-row">
                                            <div data-slot="skeleton" class="bg-muted animate-pulse dashboard-skeleton-icon"></div>
                                            <div class="flex flex-col gap-2">
                                                <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-4 w-28"></div>
                                                <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-3 w-20"></div>
                                            </div>
                                        </div>
                                        <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-8 w-8"></div>
                                    </div>
                                    <div class="dashboard-skeleton-tile-body">
                                        <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-4 w-full"></div>
                                        <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-4 w-5/6"></div>
                                        <div class="dashboard-skeleton-list">
                                            <div data-slot="skeleton" class="bg-muted animate-pulse size-5 rounded-md"></div>
                                            <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-3 flex-1"></div>
                                        </div>
                                        <div class="dashboard-skeleton-list">
                                            <div data-slot="skeleton" class="bg-muted animate-pulse size-5 rounded-md"></div>
                                            <div data-slot="skeleton" class="bg-muted rounded-md animate-pulse h-3 w-4/5"></div>
                                        </div>
                                    </div>
                                </div>
                            </article>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </section>
        <global class="thefooter"></global>
    </main>
</body>
</html>
