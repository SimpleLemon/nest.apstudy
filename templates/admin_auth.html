<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>Auth - APStudy Nest Admin</title>
    <script>window.APSTUDY_THEME_PREFERENCE = "{{ theme_preference or '' }}";</script>
    <script src="{{ url_for('static', filename='js/core/theme-init.js') }}"></script>
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png" alt="APStudy Logo">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    {% include "_font_assets.html" %}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-page" data-initial-auth-tab="{{ initial_tab }}" data-analytics-mode="authenticated" data-analytics-measurement-id="G-0NT330ZX5L">
    {% include "_admin_sidebar.html" %}
    <main class="admin-shell" id="admin-auth-shell">
        <header class="admin-header admin-page-header">
            <div>
                {% include "_admin_breadcrumbs.html" %}
                <h1 class="admin-title">People &amp; permissions{% if pending_request_count %} <span class="admin-title-count">({{ pending_request_count }} pending)</span>{% endif %}</h1>
                <nav class="admin-segmented" aria-label="Auth sections" id="admin-auth-tabs">
                    <button class="admin-segmented-btn{% if initial_tab == 'users' %} is-active{% endif %}" type="button" data-auth-tab="users">Users</button>
                    <button class="admin-segmented-btn{% if initial_tab == 'course-tracking' %} is-active{% endif %}" type="button" data-auth-tab="course-tracking">Course Tracking</button>
                    <button class="admin-segmented-btn{% if initial_tab == 'channel-requests' %} is-active{% endif %}" type="button" data-auth-tab="channel-requests">Channel Requests</button>
                </nav>
            </div>
        </header>

        {% if error %}
            <div class="admin-alert admin-alert--error">{{ error }}</div>
        {% endif %}

        <input type="hidden" id="admin-csrf-token" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="admin-auth-panel-wrap">
            <div class="admin-auth-panel" id="admin-auth-panel" aria-live="polite"></div>
            <div class="admin-auth-overlay" id="admin-auth-overlay" hidden aria-hidden="true">
                <div class="admin-auth-overlay__content" id="admin-auth-overlay-content"></div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/core/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-nav.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-timezone.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-users.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-requests.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-auth-users.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin-auth.js') }}" defer></script>
</body>
</html>
