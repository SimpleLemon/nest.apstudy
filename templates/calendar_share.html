<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View a shared APStudy Nest calendar." />
    <title>Shared Calendar - APStudy Nest</title>
    <script>
        window.APSTUDY_THEME_PREFERENCE = "{{ theme_preference or '' }}";
    </script>
    <script src="{{ url_for('static', filename='js/theme-init.js') }}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="icon" href="https://resources.apstudy.org/images/AP-Resources-Logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    {% if share_found %}
    <script src="{{ url_for('static', filename='js/global-chrome.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/global.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/calendar/utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/calendar/course-modal.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/calendar/courses.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/calendar.js') }}" defer></script>
    {% endif %}
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body,
        .font-body,
        .font-headline,
        button,
        input,
        select,
        textarea {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
        }
    </style>
</head>
<body
    data-default-dashboard-view="{{ preferred_calendar_view|default('month') }}"
    data-calendar-buffer-days="{{ calendar_buffer_days|default(7) }}"
    data-calendar-readonly="true"
    data-public-share-code="{{ share_code or '' }}"
    data-public-calendar-title="{{ (owner_name ~ "'s Shared Calendar") if owner_name else 'Shared Calendar' }}"
    data-public-calendar-range-label="{{ scope_label or '' }}"
    class="bg-surface text-on-surface font-body min-h-screen antialiased selection:bg-primary/30 selection:text-primary-fixed">
<main class="w-full px-6 md:px-8 pt-6 pb-10 flex flex-col gap-8 relative z-10">
{% if share_found %}
<section class="flex flex-col gap-4 w-full animate-fade-in-up">
<div class="flex flex-col lg:flex-row lg:items-end justify-between gap-4">
<div>
<h1 id="calendar-title" class="text-3xl font-headline font-semibold text-on-surface mb-1">{{ owner_name }}'s Shared Calendar</h1>
<p class="text-on-surface-variant text-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span id="calendar-subtitle">{{ scope_label }}</span>
</p>
</div>
<div class="flex flex-col lg:flex-row gap-3 lg:items-center">
<div class="inline-flex h-10 items-center rounded-lg border border-outline-variant/20 bg-surface-container-low p-1">
<button id="calendar-view-week" type="button" class="inline-flex h-8 min-w-[84px] items-center justify-center rounded-md bg-transparent px-3 text-sm font-medium text-on-surface-variant transition-colors hover:bg-surface-container-high hover:text-on-surface">Weekly</button>
<button id="calendar-view-month" type="button" class="inline-flex h-8 min-w-[84px] items-center justify-center rounded-md bg-primary px-3 text-sm font-medium text-on-primary shadow-sm transition-colors">Monthly</button>
</div>
<div class="flex items-center gap-1.5 bg-surface-container-low p-1 rounded-lg border border-outline-variant/10 flex-wrap">
<div class="relative" id="calendar-popover-root">
<button id="calendar-toggle-menu" type="button" class="px-3 py-1.5 text-sm flex items-center gap-2 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[18px]">calendar_month</span>
<span>Calendars</span>
</button>
<div id="calendar-menu" style="display:none;"></div>
</div>
<div class="h-6 w-px bg-outline-variant/20"></div>
<button id="calendar-prev" type="button" class="h-8 w-8 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors flex items-center justify-center" aria-label="Previous period">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
</button>
<button id="calendar-next" type="button" class="h-8 w-8 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors flex items-center justify-center" aria-label="Next period">
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</div>
</div>
<div class="bg-surface-container-low p-4 sm:p-5 rounded-2xl border border-outline-variant/10">
<div id="calendar-view-root"></div>
</div>
</section>
{% else %}
<section class="min-h-[60vh] flex items-center justify-center">
<div class="w-full max-w-lg rounded-2xl border border-outline-variant/20 bg-surface-container-low p-8 text-center">
<span class="material-symbols-outlined text-primary text-[40px]" aria-hidden="true">event_busy</span>
<h1 class="mt-4 text-2xl font-headline font-semibold text-on-surface">Shared calendar unavailable</h1>
<p class="mt-2 text-sm text-on-surface-variant">This link may have been revoked or entered incorrectly.</p>
</div>
</section>
{% endif %}
</main>
</body>
</html>
