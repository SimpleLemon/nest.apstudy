# Include inside the nest.apstudy.org server { } block in
# /etc/nginx/sites-available/nest.apstudy.org
#
# Flask allows up to 250 MB per request (5 × 50 MB files). Default nginx
# client_max_body_size is 1 MB, which rejects multi-megabyte uploads with 413
# before the request reaches Gunicorn.

client_max_body_size 260M;
proxy_read_timeout 300s;
proxy_send_timeout 300s;
