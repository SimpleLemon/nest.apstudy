name: CI/CD Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull Latest Code Changes
        run: |
          cd /var/www/nest.apstudy.org
          git pull origin main

      - name: Upgrade Dependencies
        run: |
          cd /var/www/nest.apstudy.org
          # Check if virtual environment exists, install dependencies
          if [ -d ".venv" ]; then
            source .venv/bin/activate
            pip install -r requirements.txt
          fi

      - name: Hot-Reload Web Server Application
        run: |
          sudo systemctl restart nest
